<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAMUX DIARY</title>
    <style>
        :root { --main-gold: #FFD700; --bg-black: #0a0a0a; --theme-color: #FFD700; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-black); color: white; overflow: hidden; }

        /* 1. SPLASH SCREEN (ONE LINE - GOLDEN & BLACK) */
        #splash {
            position: fixed; inset: 0; background: #000;
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s;
        }
        .splash-title { 
            color: var(--main-gold); 
            font-size: 2rem; 
            font-weight: 800; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255,215,0,0.4); 
            margin: 0;
            white-space: nowrap;
        }
        .splash-footer { position: absolute; bottom: 30px; font-size: 12px; color: var(--main-gold); opacity: 0.7; letter-spacing: 1px; }

        /* 2. MAIN APP LAYOUT */
        #home { display: none; height: 100vh; flex-direction: column; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .top-bar { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,215,0,0.1); }
        .app-title { font-size: 1.2rem; color: var(--theme-color); font-weight: 700; }
        
        .search-area { padding: 10px 15px; }
        .search-input { width: 100%; background: #151515; border: 1px solid #222; padding: 10px 20px; border-radius: 8px; color: white; outline: none; border-left: 3px solid var(--theme-color); }

        #notes-display { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        .note-card { background: #161616; padding: 15px; border-radius: 10px; border-left: 3px solid var(--theme-color); cursor: pointer; position: relative; }
        .note-card.pinned { border-left-width: 6px; background: #1c1a10; order: -1; }
        
        .dots-btn { position: absolute; top: 12px; right: 10px; padding: 0 8px; font-size: 18px; color: #444; }
        .dropdown { display: none; position: absolute; top: 35px; right: 10px; background: #222; border: 1px solid #333; border-radius: 6px; z-index: 100; min-width: 120px; }
        .dropdown div { padding: 10px; font-size: 13px; border-bottom: 1px solid #2a2a2a; color: #eee; }
        .dropdown div:hover { background: var(--theme-color); color: black; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; background: var(--theme-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: black; font-weight: bold; z-index: 999; }

        /* SCREENS */
        .screen { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 1000; flex-direction: column; padding: 20px; overflow-y: auto; }
        .header-back { color: var(--theme-color); cursor: pointer; margin-bottom: 20px; }
        input.in, textarea.in { width: 100%; background: #111; border: 1px solid #222; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .save-btn { background: var(--theme-color); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 class="splash-title">NAMUX DIARY</h1>
        <div class="splash-footer">MADE BY NAMUX</div>
    </div>

    <div id="home">
        <div class="top-bar">
            <div style="font-size: 20px; cursor: pointer;" onclick="toggleSide(true)">☰</div>
            <div class="app-title">NAMUX DIARY</div>
            <div style="width:20px;"></div>
        </div>
        <div class="search-area">
            <input type="text" id="search" class="search-input" placeholder="Search memories..." onkeyup="renderNotes()">
        </div>
        <div id="notes-display"></div>
        <div class="fab" onclick="prepareNewNote()">+</div>
    </div>

    <div id="write-screen" class="screen">
        <div class="header-back" onclick="hideScreens()">← BACK</div>
        <input type="hidden" id="edit-id">
        <input type="text" id="title" class="in" placeholder="Entry Title...">
        <textarea id="body" class="in" rows="12" placeholder="Write here..."></textarea>
        <button class="save-btn" onclick="saveNote()">SAVE MEMORY</button>
    </div>

    <div id="read-screen" class="screen">
        <div class="header-back" onclick="hideScreens()">← BACK</div>
        <h2 id="read-title" style="color:var(--theme-color);"></h2>
        <div id="read-date" style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 15px;"></div>
        <div id="read-body" style="line-height: 1.6; white-space: pre-wrap;"></div>
        <button class="save-btn" id="edit-action-btn" style="margin-top:20px;">EDIT NOTE</button>
        <div id="delete-action" style="color:red; text-align:center; margin-top:30px; cursor:pointer;">Delete Forever</div>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('home').style.display = 'flex';
                    renderNotes();
                }, 800);
            }, 2000);
        };

        function hideScreens() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        }

        function showScreen(id) {
            hideScreens();
            document.getElementById(id).style.display = 'flex';
        }

        function prepareNewNote() {
            document.getElementById('edit-id').value = '';
            document.getElementById('title').value = '';
            document.getElementById('body').value = '';
            showScreen('write-screen');
        }

        function saveNote() {
            const t = document.getElementById('title').value;
            const b = document.getElementById('body').value;
            const editId = document.getElementById('edit-id').value;
            if(!t || !b) return;

            let notes = JSON.parse(localStorage.getItem('namux_master') || '[]');
            if(editId) {
                notes = notes.map(n => n.id == editId ? {...n, title: t, body: b} : n);
            } else {
                notes.unshift({ id: Date.now(), title: t, body: b, date: new Date().toLocaleString() });
            }
            localStorage.setItem('namux_master', JSON.stringify(notes));
            hideScreens();
            renderNotes();
        }

        function renderNotes() {
            const notes = JSON.parse(localStorage.getItem('namux_master') || '[]');
            const container = document.getElementById('notes-display');
            const search = document.getElementById('search').value.toUpperCase();
            container.innerHTML = '';

            notes.forEach(n => {
                if(!n.title.toUpperCase().includes(search)) return;
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openNote(n.id);
                card.innerHTML = `
                    <h3 style="color:var(--theme-color); margin:0;">${n.title}</h3>
                    <p style="opacity:0.6; font-size:0.85rem; margin:8px 0;">${n.body.substring(0, 50)}...</p>
                    <small style="opacity:0.3; font-size:10px;">${n.date}</small>
                `;
                container.appendChild(card);
            });
        }

        function openNote(id) {
            const note = JSON.parse(localStorage.getItem('namux_master')).find(n => n.id === id);
            document.getElementById('read-title').innerText = note.title;
            document.getElementById('read-body').innerText = note.body;
            document.getElementById('read-date').innerText = note.date;
            
            document.getElementById('edit-action-btn').onclick = () => {
                document.getElementById('edit-id').value = note.id;
                document.getElementById('title').value = note.title;
                document.getElementById('body').value = note.body;
                showScreen('write-screen');
            };
            document.getElementById('delete-action').onclick = () => {
                if(confirm("Delete this memory?")) {
                    let notes = JSON.parse(localStorage.getItem('namux_master'));
                    localStorage.setItem('namux_master', JSON.stringify(notes.filter(x => x.id !== id)));
                    hideScreens();
                    renderNotes();
                }
            };
            showScreen('read-screen');
        }
    </script>
</body>
</html>
